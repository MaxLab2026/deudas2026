<!DOCTYPE html>
<html lang="es">
<head>
<!--
  ╔══════════════════════════════════════════════════════╗
  ║         SNOWBALL — Gestor de Deudas Personal         ║
  ╠══════════════════════════════════════════════════════╣
  ║  Android: Chrome → ⋮ → "Añadir a pantalla de inicio" ║
  ║  iPhone:  Safari → □↑ → "Añadir a pantalla de inicio"║
  ╚══════════════════════════════════════════════════════╝
-->
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#080f1a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Snowball"/>
<title>Snowball — Mis Deudas</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:     #080f1a;
  --bg2:    #0d1828;
  --bg3:    #111f33;
  --border: #1a2e47;
  --green:  #20d68a;
  --green2: #0f7a4e;
  --red:    #f87171;
  --yellow: #fbbf24;
  --blue:   #60a5fa;
  --text:   #e2eaf5;
  --text2:  #6b8aaa;
  --radius: 16px;
}
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:15px;overscroll-behavior:none;-webkit-font-smoothing:antialiased}

#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;overflow:hidden}
#pages{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}

.page{display:none;padding:20px 16px 100px;animation:fadeUp .25s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.4px}
.page-subtitle{font-size:12px;color:var(--text2);margin-top:2px}

#tabs{display:flex;background:var(--bg2);border-top:1px solid var(--border);padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:10}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;background:none;border:none;color:var(--text2);font-family:'DM Sans',system-ui,sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:color .2s;-webkit-tap-highlight-color:transparent}
.tab svg{transition:transform .2s}
.tab.active{color:var(--green)}
.tab.active svg{transform:translateY(-2px)}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}

.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),transparent)}
.kpi-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.kpi-value{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.kpi-value.accent{color:var(--green)}
.kpi-value.warn{color:var(--yellow)}

.progress-row{margin-bottom:14px}
.progress-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.progress-track{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green2),var(--green));transition:width .6s cubic-bezier(.4,0,.2,1)}

.debt-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;animation:fadeUp .2s ease}
.debt-item-top{display:flex;align-items:center;gap:12px}
.debt-icon{width:40px;height:40px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.debt-info{flex:1;min-width:0}
.debt-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.debt-details{font-size:12px;color:var(--text2);margin-top:2px;font-family:'DM Mono',monospace}
.debt-amount{font-family:'DM Mono',monospace;font-size:15px;font-weight:600;color:var(--red);white-space:nowrap}
.debt-actions{display:flex;gap:6px}
.debt-footer{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap}

.pay-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(26,46,71,.5)}
.pay-item:last-child{border-bottom:none}
.pay-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.pay-info{flex:1;min-width:0}
.pay-amount{font-family:'DM Mono',monospace;font-weight:600;font-size:14px;color:var(--green)}
.pay-date{font-size:11px;color:var(--text2);margin-top:2px}
.pay-note{font-size:11px;color:var(--text2);font-style:italic;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pay-actions{display:flex;gap:5px;flex-shrink:0}

.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:12px;border:none;font-family:'DM Sans',system-ui,sans-serif;font-size:15px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s,transform .1s}
.btn:active{opacity:.85;transform:scale(.98)}
.btn-primary{background:var(--green);color:#021a0e}
.btn-secondary{background:var(--bg3);border:1px solid var(--border);color:var(--text)}
.btn-danger{background:#2d1010;border:1px solid #4d1515;color:var(--red)}
.btn-pay{background:rgba(32,214,138,.1);border:1px solid rgba(32,214,138,.25);color:var(--green);font-size:12px;padding:7px 12px;border-radius:8px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:'DM Sans',system-ui,sans-serif}
.btn-hist{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25);color:var(--blue);font-size:12px;padding:7px 12px;border-radius:8px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:'DM Sans',system-ui,sans-serif}

.btn-icon{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
.btn-icon:active{background:var(--border)}
.btn-icon.sm{width:28px;height:28px;border-radius:7px}
.btn-icon.danger-hover:active{color:var(--red);border-color:var(--red)}

#fab{position:fixed;bottom:82px;right:16px;width:52px;height:52px;border-radius:16px;background:var(--green);border:none;color:#021a0e;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(32,214,138,.35);cursor:pointer;z-index:20;-webkit-tap-highlight-color:transparent;transition:transform .15s}
#fab:active{transform:scale(.92)}
#fab.hidden{display:none}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:50;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:20px 20px max(20px,env(safe-area-inset-bottom));width:100%;max-width:480px;animation:slideUp .25s cubic-bezier(.4,0,.2,1);max-height:92dvh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 20px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px;text-align:center}

.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:15px;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--green)}
.form-input::placeholder{color:var(--text2)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.plan-input-row{display:flex;gap:10px;margin-bottom:20px;align-items:flex-end}
.plan-input-row .form-group{flex:1;margin-bottom:0}
.cronograma-table{width:100%;border-collapse:collapse;font-size:12px}
.cronograma-table th{text-align:left;color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:8px 6px;border-bottom:1px solid var(--border)}
.cronograma-table td{padding:9px 6px;border-bottom:1px solid rgba(26,46,71,.5);font-family:'DM Mono',monospace;font-size:11px}
.cronograma-table tr:last-child td{border-bottom:none}
.tag-paid{background:rgba(32,214,138,.15);color:var(--green);border-radius:6px;padding:2px 7px;font-size:10px;font-weight:600}
.tag-active{background:rgba(251,191,36,.12);color:var(--yellow);border-radius:6px;padding:2px 7px;font-size:10px;font-weight:600}

.section-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:12px;margin-top:4px}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.badge-green{background:rgba(32,214,138,.15);color:var(--green)}
.snowball-target{border-color:rgba(32,214,138,.3);background:rgba(32,214,138,.04)}
.empty{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty-text{font-size:14px;line-height:1.6}

#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:99px;font-size:13px;font-weight:500;z-index:100;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}

#confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:80;display:none;align-items:center;justify-content:center;padding:20px}
#confirm-overlay.open{display:flex;animation:fadeIn .2s ease}
.confirm-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:320px;text-align:center}
.confirm-title{font-size:16px;font-weight:700;margin-bottom:8px}
.confirm-msg{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:20px}
.confirm-actions{display:flex;gap:10px}

@media print{#tabs,#fab,.overlay,#toast,#confirm-overlay,.btn-pay,.btn-hist,.btn-icon,.debt-footer{display:none!important}body{background:white;color:black}.card,.kpi,.debt-item{border:1px solid #ddd;background:white}*{color:#111!important}.page{display:block!important;padding-bottom:20px!important}}
</style>
</head>
<body>
<div id="app">
  <div id="pages">

    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page active">
      <div class="page-header">
        <div><div class="page-title">Dashboard</div><div class="page-subtitle" id="dash-subtitle">cargando...</div></div>
        <div style="font-size:24px">❄️</div>
      </div>
      <div class="kpi-grid" id="kpi-grid"></div>
      <div class="section-label">Progreso por deuda</div>
      <div class="card" id="progress-section"></div>
      <div class="section-label" style="margin-top:16px">Distribución</div>
      <div class="card" style="padding:12px"><canvas id="chart-pie" height="200"></canvas></div>
    </div>

    <!-- DEUDAS -->
    <div id="page-deudas" class="page">
      <div class="page-header">
        <div><div class="page-title">Mis Deudas</div><div class="page-subtitle" id="deudas-subtitle">0 deudas</div></div>
      </div>
      <div id="debt-list"></div>
    </div>

    <!-- PLAN -->
    <div id="page-plan" class="page">
      <div class="page-header">
        <div><div class="page-title">Plan Bola de Nieve</div><div class="page-subtitle">Tu ruta a la libertad financiera</div></div>
        <div style="font-size:22px">🏔️</div>
      </div>
      <div class="plan-input-row">
        <div class="form-group">
          <label class="form-label">Pago mensual disponible</label>
          <input id="pago-mensual" type="number" class="form-input" placeholder="0.00" min="0" step="0.01"/>
        </div>
        <button class="btn btn-primary" style="width:auto;padding:12px 20px;flex-shrink:0" onclick="calcularPlan()">Calcular</button>
      </div>
      <div id="plan-result"></div>
    </div>

  </div>

  <nav id="tabs">
    <button class="tab active" onclick="navTo('dashboard',this)">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      Dashboard
    </button>
    <button class="tab" onclick="navTo('deudas',this)">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      Deudas
    </button>
    <button class="tab" onclick="navTo('plan',this)">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Plan
    </button>
  </nav>

  <button id="fab" onclick="openDeudaModal()">+</button>
</div>

<!-- MODAL: DEUDA -->
<div id="overlay-deuda" class="overlay" onclick="closeIfOutside(event,'overlay-deuda')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-deuda-title">Nueva Deuda</div>
    <div class="form-group">
      <label class="form-label">Acreedor / Nombre</label>
      <input id="f-acreedor" type="text" class="form-input" placeholder="Ej: Banco, Tarjeta Visa..."/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Monto original</label>
        <input id="f-original" type="number" class="form-input" placeholder="0.00" min="0" step="0.01"/>
      </div>
      <div class="form-group">
        <label class="form-label">Saldo actual</label>
        <input id="f-actual" type="number" class="form-input" placeholder="0.00" min="0" step="0.01"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Pago mínimo / mes</label>
        <input id="f-minimo" type="number" class="form-input" placeholder="0.00" min="0" step="0.01"/>
      </div>
      <div class="form-group">
        <label class="form-label">Tasa interés % anual</label>
        <input id="f-interes" type="number" class="form-input" placeholder="Opcional" min="0" step="0.01"/>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal('overlay-deuda')">Cancelar</button>
      <button class="btn btn-primary" style="flex:2" onclick="guardarDeuda()">Guardar</button>
    </div>
    <div id="btn-eliminar-deuda" style="margin-top:10px;display:none">
      <button class="btn btn-danger" onclick="confirmarEliminarDeuda()">Eliminar deuda completa</button>
    </div>
  </div>
</div>

<!-- MODAL: REGISTRAR PAGO -->
<div id="overlay-pago" class="overlay" onclick="closeIfOutside(event,'overlay-pago')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-pago-title">Registrar Pago</div>
    <div class="form-group">
      <label class="form-label">Monto pagado</label>
      <input id="p-monto" type="number" class="form-input" placeholder="0.00" min="0.01" step="0.01"/>
    </div>
    <div class="form-group">
      <label class="form-label">Fecha del pago</label>
      <input id="p-fecha" type="date" class="form-input"/>
    </div>
    <div class="form-group">
      <label class="form-label">Nota (opcional)</label>
      <input id="p-nota" type="text" class="form-input" placeholder="Ej: cuota de enero..."/>
    </div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal('overlay-pago')">Cancelar</button>
      <button class="btn btn-primary" style="flex:2" onclick="guardarPago()">Guardar pago</button>
    </div>
  </div>
</div>

<!-- MODAL: HISTORIAL -->
<div id="overlay-historial" class="overlay" onclick="closeIfOutside(event,'overlay-historial')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-historial-title">Historial de pagos</div>
    <div id="historial-list"></div>
    <div style="margin-top:16px">
      <button class="btn btn-secondary" onclick="closeModal('overlay-historial')">Cerrar</button>
    </div>
  </div>
</div>

<!-- MODAL: EDITAR PAGO -->
<div id="overlay-edit-pago" class="overlay" onclick="closeIfOutside(event,'overlay-edit-pago')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Editar Pago</div>
    <div class="form-group">
      <label class="form-label">Monto pagado</label>
      <input id="ep-monto" type="number" class="form-input" placeholder="0.00" min="0.01" step="0.01"/>
    </div>
    <div class="form-group">
      <label class="form-label">Fecha del pago</label>
      <input id="ep-fecha" type="date" class="form-input"/>
    </div>
    <div class="form-group">
      <label class="form-label">Nota (opcional)</label>
      <input id="ep-nota" type="text" class="form-input" placeholder="Ej: cuota de enero..."/>
    </div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal('overlay-edit-pago')">Cancelar</button>
      <button class="btn btn-primary" style="flex:2" onclick="guardarEdicionPago()">Guardar cambios</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirm-title">¿Estás seguro?</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-actions">
      <button class="btn btn-secondary" style="flex:1" onclick="closeConfirm()">Cancelar</button>
      <button class="btn btn-danger" style="flex:1" id="confirm-ok-btn">Eliminar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── ESTADO ──────────────────────────────────────────
let deudas        = [];
let editingDeudaId = null;
let pagoDeudaId    = null;
let editingPagoId  = null;
let historialDeudaId = null;
let pieChart       = null;

const SK = 'snowball_v2';

function load()  { try { deudas = JSON.parse(localStorage.getItem(SK)) || []; } catch { deudas = []; } }
function save()  { localStorage.setItem(SK, JSON.stringify(deudas)); }
function uid()   { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { return new Date().toISOString().slice(0,10); }

function fmt(n) {
  return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n);
}
function fmtS(n) {
  if(n>=1e6) return '$'+(n/1e6).toFixed(1)+'M';
  if(n>=1e3) return '$'+(n/1e3).toFixed(0)+'K';
  return '$'+Math.round(n);
}
function fmtDate(s) {
  if(!s) return '';
  const [y,m,d]=s.split('-');
  return `${d}/${m}/${y}`;
}
function saldoReal(d) {
  const pagado = (d.pagos||[]).reduce((s,p)=>s+p.monto,0);
  return Math.max(0, d.actual - pagado);
}

// ── NAVEGACIÓN ──────────────────────────────────────
function navTo(page, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  btn.classList.add('active');
  document.getElementById('fab').classList.toggle('hidden', page!=='deudas');
  if(page==='dashboard') renderDashboard();
  if(page==='deudas')    renderDeudas();
}

// ── MODALES ─────────────────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeIfOutside(e,id) { if(e.target.id===id) closeModal(id); }

// ── CONFIRM ─────────────────────────────────────────
function showConfirm(title, msg, cb) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent   = msg;
  document.getElementById('confirm-ok-btn').onclick    = ()=>{ cb(); closeConfirm(); };
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('open');
}

// ── DASHBOARD ───────────────────────────────────────
const EMOJIS = ['💳','🏦','🏠','🚗','📱','💊','🎓','💼','🔑','⚡'];

function renderDashboard() {
  const activos = deudas.filter(d=>saldoReal(d)>0);
  const total   = activos.reduce((s,d)=>s+saldoReal(d), 0);
  const pagos   = deudas.reduce((s,d)=>s+d.minimo, 0);
  const objetivo = activos.length ? [...activos].sort((a,b)=>saldoReal(a)-saldoReal(b))[0] : null;

  document.getElementById('dash-subtitle').textContent =
    activos.length ? `${activos.length} deuda${activos.length!==1?'s':''} activa${activos.length!==1?'s':''}` : 'sin deudas activas';

  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi">
      <div class="kpi-label">Total pendiente</div>
      <div class="kpi-value" style="font-size:17px">${fmtS(total)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Pagos / mes</div>
      <div class="kpi-value warn" style="font-size:17px">${fmtS(pagos)}</div>
    </div>
    <div class="kpi snowball-target" style="grid-column:span 2">
      <div class="kpi-label">🎯 Objetivo bola de nieve</div>
      <div class="kpi-value accent">${objetivo ? objetivo.acreedor : '¡Sin deudas!'}</div>
      ${objetivo ? `<div style="font-size:11px;color:var(--text2);margin-top:4px;font-family:'DM Mono',monospace">${fmt(saldoReal(objetivo))} restante</div>` : ''}
    </div>`;

  const ps = document.getElementById('progress-section');
  if(!deudas.length) {
    ps.innerHTML='<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Agrega deudas para ver el progreso</div></div>';
  } else {
    ps.innerHTML=[...deudas].sort((a,b)=>saldoReal(a)-saldoReal(b)).map(d=>{
      const sr  = saldoReal(d);
      const pct = Math.max(0,Math.min(100,(d.original-sr)/d.original*100));
      return `<div class="progress-row">
        <div class="progress-label">
          <span style="font-weight:600">${d.acreedor}</span>
          <span style="color:var(--text2);font-family:'DM Mono',monospace">${Math.round(pct)}% ${sr===0?'✓':''}</span>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');
  }

  const ctx=document.getElementById('chart-pie').getContext('2d');
  if(pieChart) pieChart.destroy();
  if(!deudas.length){ctx.clearRect(0,0,400,200);return;}
  const COLORS=['#20d68a','#3b82f6','#f59e0b','#f87171','#a78bfa','#34d399','#60a5fa','#fbbf24'];
  pieChart=new Chart(ctx,{
    type:'doughnut',
    data:{labels:deudas.map(d=>d.acreedor),datasets:[{data:deudas.map(d=>saldoReal(d)),backgroundColor:COLORS.slice(0,deudas.length),borderColor:'#0d1828',borderWidth:2}]},
    options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#6b8aaa',font:{size:11},padding:12}},tooltip:{callbacks:{label:c=>' '+fmt(c.parsed)}}},cutout:'60%'}
  });
}

// ── DEUDAS RENDER ───────────────────────────────────
function renderDeudas() {
  const list=document.getElementById('debt-list');
  document.getElementById('deudas-subtitle').textContent=
    `${deudas.length} deuda${deudas.length!==1?'s':''} registrada${deudas.length!==1?'s':''}`;

  if(!deudas.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">💸</div><div class="empty-text">Sin deudas registradas.<br>Toca <strong>+</strong> para agregar la primera.</div></div>`;
    return;
  }

  const sorted=[...deudas].sort((a,b)=>saldoReal(a)-saldoReal(b));
  list.innerHTML=sorted.map((d,i)=>{
    const sr     = saldoReal(d);
    const pct    = Math.max(0,Math.min(100,(d.original-sr)/d.original*100));
    const isT    = i===0 && sr>0;
    const nPagos = (d.pagos||[]).length;
    const totalPagado = (d.pagos||[]).reduce((s,p)=>s+p.monto,0);
    return `
    <div class="debt-item ${isT?'snowball-target':''}">
      <div class="debt-item-top">
        <div class="debt-icon">${EMOJIS[i%EMOJIS.length]}</div>
        <div class="debt-info">
          <div class="debt-name">${d.acreedor}${isT?' <span class="badge badge-green">🎯 objetivo</span>':''}</div>
          <div class="debt-details">Mín: ${fmtS(d.minimo)}/mes${d.interes?' · '+d.interes+'%':''} · Pagado: ${fmtS(totalPagado)}</div>
          <div style="margin-top:6px"><div class="progress-track" style="height:4px"><div class="progress-fill" style="width:${pct}%"></div></div></div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="debt-amount" style="${sr===0?'color:var(--green)':''}">${sr===0?'✓ Pagada':fmtS(sr)}</div>
          <div class="debt-actions" style="margin-top:8px;justify-content:flex-end">
            <button class="btn-icon" title="Editar deuda" onclick="openDeudaModal('${d.id}')">
              <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="debt-footer">
        ${sr>0?`<button class="btn-pay" onclick="openPagoModal('${d.id}')">+ Registrar pago</button>`:''}
        ${nPagos?`<button class="btn-hist" onclick="openHistorial('${d.id}')">📋 Ver pagos (${nPagos})</button>`:''}
      </div>
    </div>`;
  }).join('');
}

// ── MODAL DEUDA ─────────────────────────────────────
function openDeudaModal(id=null) {
  editingDeudaId=id;
  document.getElementById('modal-deuda-title').textContent = id ? 'Editar Deuda' : 'Nueva Deuda';
  document.getElementById('btn-eliminar-deuda').style.display = id ? 'block' : 'none';
  if(id) {
    const d=deudas.find(x=>x.id===id);
    document.getElementById('f-acreedor').value = d.acreedor;
    document.getElementById('f-original').value  = d.original;
    document.getElementById('f-actual').value    = d.actual;
    document.getElementById('f-minimo').value    = d.minimo;
    document.getElementById('f-interes').value   = d.interes||'';
  } else {
    ['f-acreedor','f-original','f-actual','f-minimo','f-interes'].forEach(i=>document.getElementById(i).value='');
  }
  document.getElementById('overlay-deuda').classList.add('open');
  setTimeout(()=>document.getElementById('f-acreedor').focus(),220);
}

function guardarDeuda() {
  const acreedor=document.getElementById('f-acreedor').value.trim();
  const original=parseFloat(document.getElementById('f-original').value);
  const actual  =parseFloat(document.getElementById('f-actual').value);
  const minimo  =parseFloat(document.getElementById('f-minimo').value);
  const interes =parseFloat(document.getElementById('f-interes').value)||null;

  if(!acreedor||isNaN(original)||isNaN(actual)||isNaN(minimo)){toast('⚠️ Completa los campos requeridos');return;}
  if(actual>original){toast('⚠️ Saldo actual no puede superar el monto original');return;}
  if(minimo<=0){toast('⚠️ El pago mínimo debe ser mayor a 0');return;}

  if(editingDeudaId){
    const idx=deudas.findIndex(d=>d.id===editingDeudaId);
    deudas[idx]={...deudas[idx],acreedor,original,actual,minimo,interes};
    toast('✅ Deuda actualizada');
  } else {
    deudas.push({id:uid(),acreedor,original,actual,minimo,interes,pagos:[]});
    toast('✅ Deuda agregada');
  }
  save(); closeModal('overlay-deuda'); renderDeudas();
}

function confirmarEliminarDeuda() {
  showConfirm('Eliminar deuda','¿Eliminar esta deuda y todos sus pagos? No se puede deshacer.',()=>{
    deudas=deudas.filter(d=>d.id!==editingDeudaId);
    save(); closeModal('overlay-deuda'); renderDeudas(); toast('🗑️ Deuda eliminada');
  });
}

// ── MODAL PAGO ──────────────────────────────────────
function openPagoModal(deudaId) {
  pagoDeudaId=deudaId;
  const d=deudas.find(x=>x.id===deudaId);
  document.getElementById('modal-pago-title').textContent=`Pago — ${d.acreedor}`;
  document.getElementById('p-monto').value='';
  document.getElementById('p-fecha').value=today();
  document.getElementById('p-nota').value='';
  document.getElementById('overlay-pago').classList.add('open');
  setTimeout(()=>document.getElementById('p-monto').focus(),220);
}

function guardarPago() {
  const monto=parseFloat(document.getElementById('p-monto').value);
  const fecha=document.getElementById('p-fecha').value;
  const nota =document.getElementById('p-nota').value.trim();

  if(isNaN(monto)||monto<=0){toast('⚠️ Ingresa un monto válido');return;}
  if(!fecha){toast('⚠️ Selecciona la fecha');return;}

  const d=deudas.find(x=>x.id===pagoDeudaId);
  if(!d.pagos) d.pagos=[];
  const sr=saldoReal(d);
  if(monto>sr+0.01){toast(`⚠️ El pago supera el saldo (${fmt(sr)})`);return;}

  d.pagos.push({id:uid(),monto,fecha,nota});
  d.pagos.sort((a,b)=>b.fecha.localeCompare(a.fecha));
  save(); closeModal('overlay-pago'); renderDeudas();
  toast(`✅ Pago de ${fmt(monto)} registrado`);
}

// ── HISTORIAL ───────────────────────────────────────
function openHistorial(deudaId) {
  historialDeudaId=deudaId;
  const d=deudas.find(x=>x.id===deudaId);
  const pagos=d.pagos||[];
  const total=pagos.reduce((s,p)=>s+p.monto,0);
  document.getElementById('modal-historial-title').textContent=`Pagos — ${d.acreedor}`;

  if(!pagos.length){
    document.getElementById('historial-list').innerHTML=
      '<div class="empty" style="padding:24px"><div class="empty-icon">📭</div><div class="empty-text">Sin pagos registrados</div></div>';
  } else {
    document.getElementById('historial-list').innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;margin-bottom:4px;border-bottom:1px solid var(--border)">
        <span style="font-size:12px;color:var(--text2)">${pagos.length} pago${pagos.length!==1?'s':''}</span>
        <span style="font-family:'DM Mono',monospace;font-weight:700;color:var(--green)">${fmt(total)} pagado</span>
      </div>
      ${pagos.map(p=>`
        <div class="pay-item">
          <div class="pay-dot"></div>
          <div class="pay-info">
            <div class="pay-amount">${fmt(p.monto)}</div>
            <div class="pay-date">${fmtDate(p.fecha)}</div>
            ${p.nota?`<div class="pay-note">${p.nota}</div>`:''}
          </div>
          <div class="pay-actions">
            <button class="btn-icon sm" title="Editar pago" onclick="openEditPago('${deudaId}','${p.id}')">
              <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="btn-icon sm danger-hover" title="Eliminar pago" onclick="eliminarPago('${deudaId}','${p.id}')">
              <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        </div>`).join('')}`;
  }
  document.getElementById('overlay-historial').classList.add('open');
}

// ── EDITAR PAGO ─────────────────────────────────────
function openEditPago(deudaId, pagoId) {
  pagoDeudaId  =deudaId;
  editingPagoId=pagoId;
  const d=deudas.find(x=>x.id===deudaId);
  const p=d.pagos.find(x=>x.id===pagoId);
  document.getElementById('ep-monto').value=p.monto;
  document.getElementById('ep-fecha').value=p.fecha;
  document.getElementById('ep-nota').value =p.nota||'';
  closeModal('overlay-historial');
  document.getElementById('overlay-edit-pago').classList.add('open');
  setTimeout(()=>document.getElementById('ep-monto').focus(),220);
}

function guardarEdicionPago() {
  const monto=parseFloat(document.getElementById('ep-monto').value);
  const fecha=document.getElementById('ep-fecha').value;
  const nota =document.getElementById('ep-nota').value.trim();

  if(isNaN(monto)||monto<=0){toast('⚠️ Ingresa un monto válido');return;}
  if(!fecha){toast('⚠️ Selecciona la fecha');return;}

  const d  =deudas.find(x=>x.id===pagoDeudaId);
  const idx=d.pagos.findIndex(x=>x.id===editingPagoId);
  const otrosPagados=d.pagos.filter(x=>x.id!==editingPagoId).reduce((s,p)=>s+p.monto,0);
  const disponible  =d.actual-otrosPagados;
  if(monto>disponible+0.01){toast(`⚠️ Monto supera el saldo disponible (${fmt(disponible)})`);return;}

  d.pagos[idx]={...d.pagos[idx],monto,fecha,nota};
  d.pagos.sort((a,b)=>b.fecha.localeCompare(a.fecha));
  save(); closeModal('overlay-edit-pago'); renderDeudas();
  toast('✅ Pago actualizado');
  // Reabrir historial
  setTimeout(()=>openHistorial(pagoDeudaId),150);
}

// ── ELIMINAR PAGO ───────────────────────────────────
function eliminarPago(deudaId, pagoId) {
  const d=deudas.find(x=>x.id===deudaId);
  const p=d.pagos.find(x=>x.id===pagoId);
  showConfirm(
    'Eliminar pago',
    `¿Eliminar el pago de ${fmt(p.monto)} del ${fmtDate(p.fecha)}?`,
    ()=>{
      d.pagos=d.pagos.filter(x=>x.id!==pagoId);
      save(); renderDeudas(); closeModal('overlay-historial');
      setTimeout(()=>openHistorial(deudaId),150);
      toast('🗑️ Pago eliminado');
    }
  );
}

// ── PLAN BOLA DE NIEVE ──────────────────────────────
function calcularBolaDeNieve(deudasInput, pagoMensualTotal) {
  let lista=deudasInput
    .filter(d=>saldoReal(d)>0)
    .map(d=>({...d,saldo:saldoReal(d)}))
    .sort((a,b)=>a.saldo-b.saldo);

  const cron=[]; let mes=0; let totalInt=0;

  while(lista.some(d=>d.saldo>0)&&mes<360){
    mes++;
    lista.forEach(d=>{
      if(d.interes&&d.saldo>0){const im=d.saldo*(d.interes/100/12);d.saldo+=im;totalInt+=im;}
    });
    const minTot=lista.filter(d=>d.saldo>0).reduce((s,d)=>s+d.minimo,0);
    let exc=Math.max(0,pagoMensualTotal-minTot);
    const pagos=[];
    lista.forEach((d,i)=>{
      if(d.saldo<=0)return;
      let pago=Math.min(d.minimo,d.saldo);
      const esObj=lista.findIndex(x=>x.saldo>0)===i;
      if(esObj&&exc>0){pago=Math.min(d.saldo,pago+exc);exc=0;}
      d.saldo=Math.max(0,d.saldo-pago);
      if(d.saldo===0&&exc===0)exc=d.minimo;
      pagos.push({acreedor:d.acreedor,pago,saldo:d.saldo});
    });
    cron.push({mes,pagos});
    lista.forEach(d=>{if(d.saldo<=0)d.minimo=0;});
  }
  return{cronograma:cron,meses:mes,totalIntereses:totalInt};
}

function calcularPlan() {
  const pago=parseFloat(document.getElementById('pago-mensual').value);
  const result=document.getElementById('plan-result');
  const activos=deudas.filter(d=>saldoReal(d)>0);

  if(!activos.length){
    result.innerHTML='<div class="empty"><div class="empty-icon">🎉</div><div class="empty-text">¡No tienes deudas activas!</div></div>';
    return;
  }
  if(isNaN(pago)||pago<=0){toast('⚠️ Ingresa cuánto puedes pagar al mes');return;}

  const minimos=activos.reduce((s,d)=>s+d.minimo,0);
  if(pago<minimos){
    result.innerHTML=`<div class="card" style="border-color:var(--red)"><div style="color:var(--red);font-weight:600;margin-bottom:6px">⚠️ Pago insuficiente</div><div style="font-size:13px;color:var(--text2)">El mínimo requerido es <strong style="color:var(--text)">${fmt(minimos)}</strong>.</div></div>`;
    return;
  }

  const{cronograma,meses,totalIntereses}=calcularBolaDeNieve(deudas,pago);
  const libre=new Date(); libre.setMonth(libre.getMonth()+meses);
  const fechaStr=libre.toLocaleDateString('es-CO',{month:'long',year:'numeric'});
  const años=Math.floor(meses/12),mr=meses%12;
  const dur=[años&&`${años} año${años>1?'s':''}`,mr&&`${mr} mes${mr>1?'es':''}`].filter(Boolean).join(' y ');

  result.innerHTML=`
    <div class="kpi-grid" style="margin-bottom:16px">
      <div class="kpi"><div class="kpi-label">Meses hasta libertad</div><div class="kpi-value accent">${meses}</div></div>
      <div class="kpi"><div class="kpi-label">Duración</div><div class="kpi-value" style="font-size:14px">${dur}</div></div>
      <div class="kpi" style="grid-column:span 2"><div class="kpi-label">🎉 Fecha estimada de libertad</div><div class="kpi-value accent" style="font-size:18px;text-transform:capitalize">${fechaStr}</div></div>
      ${totalIntereses>0?`<div class="kpi" style="grid-column:span 2"><div class="kpi-label">Total intereses</div><div class="kpi-value warn">${fmt(totalIntereses)}</div></div>`:''}
    </div>
    <div class="section-label">Cronograma mes a mes</div>
    <div class="card" style="padding:0;overflow:hidden;overflow-x:auto">
      <table class="cronograma-table">
        <thead><tr><th>Mes</th><th>Deuda</th><th>Pago</th><th>Saldo</th><th>Estado</th></tr></thead>
        <tbody>${cronograma.map(m=>m.pagos.map(p=>`
          <tr>
            <td style="color:var(--text2)">${m.mes}</td>
            <td>${p.acreedor}</td>
            <td>${fmtS(p.pago)}</td>
            <td style="color:${p.saldo===0?'var(--green)':'var(--text)'}">${fmtS(p.saldo)}</td>
            <td>${p.saldo===0?'<span class="tag-paid">✓ Pagada</span>':'<span class="tag-active">activa</span>'}</td>
          </tr>`).join('')).join('')}</tbody>
      </table>
    </div>
    <div style="margin-top:14px">
      <button class="btn btn-secondary" onclick="window.print()" style="font-size:13px;padding:11px">🖨️ Imprimir plan</button>
    </div>`;
}

// ── TOAST ────────────────────────────────────────────
let tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('show'),2800);
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

// ── INIT ─────────────────────────────────────────────
load();
renderDashboard();
</script>
