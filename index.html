<!DOCTYPE html>
<html lang="es">
<head>
<!--
  ╔══════════════════════════════════════════════════════╗
  ║         SNOWBALL — Gestor de Deudas Personal         ║

-->
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#080f1a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Snowball"/>
<title>Snowball — Mis Deudas</title>
<link rel="manifest" href="data:application/json,{
  %22name%22:%22Snowball%20Deudas%22,
  %22short_name%22:%22Snowball%22,
  %22start_url%22:%22.%2Findex.html%22,
  %22display%22:%22standalone%22,
  %22background_color%22:%22%23080f1a%22,
  %22theme_color%22:%22%23080f1a%22,
  %22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%23080f1a'/%3E%3Ccircle cx='96' cy='96' r='60' fill='none' stroke='%2320d68a' stroke-width='8'/%3E%3Ccircle cx='96' cy='96' r='35' fill='%2320d68a' opacity='.3'/%3E%3Ccircle cx='96' cy='96' r='15' fill='%2320d68a'/%3E%3C/svg%3E%22,%22sizes%22:%22192x192%22,%22type%22:%22image/svg+xml%22}]
}"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:       #080f1a;
  --bg2:      #0d1828;
  --bg3:      #111f33;
  --border:   #1a2e47;
  --green:    #20d68a;
  --green2:   #0f7a4e;
  --red:      #f87171;
  --yellow:   #fbbf24;
  --text:     #e2eaf5;
  --text2:    #6b8aaa;
  --radius:   16px;
  --font:     'DM Sans', system-ui, sans-serif;
}

@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}

/* ── LAYOUT ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

#pages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

.page {
  display: none;
  padding: 20px 16px 100px;
  animation: fadeUp .25s ease;
}
.page.active { display: block; }

@keyframes fadeUp {
  from { opacity:0; transform: translateY(12px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ── HEADER ── */
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}
.page-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -.4px;
}
.page-subtitle {
  font-size: 12px;
  color: var(--text2);
  margin-top: 2px;
}

/* ── TABS ── */
#tabs {
  display: flex;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  position: relative;
  z-index: 10;
}
.tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 6px 0;
  background: none;
  border: none;
  color: var(--text2);
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: color .2s;
  -webkit-tap-highlight-color: transparent;
}
.tab svg { transition: transform .2s; }
.tab.active { color: var(--green); }
.tab.active svg { transform: translateY(-2px); }

/* ── CARDS ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.card-sm {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
}

/* ── KPI GRID ── */
.kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.kpi {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 14px;
  position: relative;
  overflow: hidden;
}
.kpi::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--green), transparent);
}
.kpi-label {
  font-size: 11px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-bottom: 8px;
}
.kpi-value {
  font-size: 20px;
  font-weight: 700;
  font-family: 'DM Mono', monospace;
  color: var(--text);
  line-height: 1;
}
.kpi-value.accent { color: var(--green); }
.kpi-value.warn   { color: var(--yellow); }

/* ── PROGRESS BARS ── */
.progress-row {
  margin-bottom: 14px;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-bottom: 6px;
}
.progress-track {
  height: 6px;
  background: var(--bg3);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--green2), var(--green));
  transition: width .6s cubic-bezier(.4,0,.2,1);
}

/* ── DEBT LIST ── */
.debt-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  animation: fadeUp .2s ease;
}
.debt-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.debt-info { flex: 1; min-width: 0; }
.debt-name {
  font-weight: 600;
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.debt-details {
  font-size: 12px;
  color: var(--text2);
  margin-top: 2px;
  font-family: 'DM Mono', monospace;
}
.debt-amount {
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  font-weight: 600;
  color: var(--red);
  white-space: nowrap;
}
.debt-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.btn-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background .15s, color .15s;
}
.btn-icon:active { background: var(--border); }
.btn-icon.danger:active { color: var(--red); }

/* ── BUTTONS ── */
.btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity .15s, transform .1s;
}
.btn:active { opacity: .85; transform: scale(.98); }
.btn-primary {
  background: var(--green);
  color: #021a0e;
}
.btn-secondary {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-danger {
  background: #2d1010;
  border: 1px solid #4d1515;
  color: var(--red);
}

/* ── FAB ── */
#fab {
  position: fixed;
  bottom: 82px;
  right: 16px;
  width: 52px; height: 52px;
  border-radius: 16px;
  background: var(--green);
  border: none;
  color: #021a0e;
  font-size: 26px;
  font-weight: 300;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 24px rgba(32,214,138,.35);
  cursor: pointer;
  z-index: 20;
  -webkit-tap-highlight-color: transparent;
  transition: transform .15s, box-shadow .15s;
}
#fab:active { transform: scale(.92); box-shadow: 0 2px 12px rgba(32,214,138,.2); }
#fab.hidden { display: none; }

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(4px);
  z-index: 50;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.overlay.open { display: flex; animation: fadeIn .2s ease; }

@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 24px 24px 0 0;
  padding: 20px 20px max(20px, env(safe-area-inset-bottom));
  width: 100%;
  max-width: 480px;
  animation: slideUp .25s cubic-bezier(.4,0,.2,1);
  max-height: 90dvh;
  overflow-y: auto;
}

@keyframes slideUp {
  from { transform: translateY(60px); opacity:0; }
  to   { transform: translateY(0); opacity:1; }
}

.modal-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 99px;
  margin: 0 auto 20px;
}
.modal-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
  text-align: center;
}

/* ── FORM ── */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: 12px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 6px;
}
.form-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  outline: none;
  transition: border-color .2s;
}
.form-input:focus { border-color: var(--green); }
.form-input::placeholder { color: var(--text2); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── PLAN TABLE ── */
.plan-input-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  align-items: flex-end;
}
.plan-input-row .form-group { flex: 1; margin-bottom: 0; }

.cronograma-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.cronograma-table th {
  text-align: left;
  color: var(--text2);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .5px;
  padding: 8px 6px;
  border-bottom: 1px solid var(--border);
}
.cronograma-table td {
  padding: 9px 6px;
  border-bottom: 1px solid rgba(26,46,71,.5);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
}
.cronograma-table tr:last-child td { border-bottom: none; }
.tag-paid {
  background: rgba(32,214,138,.15);
  color: var(--green);
  border-radius: 6px;
  padding: 2px 7px;
  font-size: 10px;
  font-weight: 600;
  white-space: nowrap;
}
.tag-active {
  background: rgba(251,191,36,.12);
  color: var(--yellow);
  border-radius: 6px;
  padding: 2px 7px;
  font-size: 10px;
  font-weight: 600;
}

/* ── SECTION LABEL ── */
.section-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text2);
  margin-bottom: 12px;
  margin-top: 4px;
}

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 48px 20px;
  color: var(--text2);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 14px; line-height: 1.6; }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 90px;
  left: 50%; transform: translateX(-50%);
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 99px;
  font-size: 13px;
  font-weight: 500;
  z-index: 100;
  white-space: nowrap;
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
}
#toast.show { opacity: 1; }

/* ── MISC ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 600;
}
.badge-green { background: rgba(32,214,138,.15); color: var(--green); }
.badge-red   { background: rgba(248,113,113,.12); color: var(--red); }

.snowball-target {
  border: 1px solid rgba(32,214,138,.3);
  background: rgba(32,214,138,.05);
}
.snowball-target .kpi-label { color: var(--green); }

canvas { max-width: 100%; }
</style>
</head>
<body>
<div id="app">

  <!-- ══ PAGES ══════════════════════════════ -->
  <div id="pages">

    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page active">
      <div class="page-header">
        <div>
          <div class="page-title">Dashboard</div>
          <div class="page-subtitle" id="dash-subtitle">cargando...</div>
        </div>
        <div style="font-size:24px">❄️</div>
      </div>

      <div class="kpi-grid" id="kpi-grid"></div>

      <div class="section-label">Progreso por deuda</div>
      <div class="card" id="progress-section">
        <div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Agrega deudas para ver el progreso</div></div>
      </div>

      <div class="section-label" style="margin-top:16px">Distribución</div>
      <div class="card" style="padding:12px">
        <canvas id="chart-pie" height="200"></canvas>
      </div>
    </div>

    <!-- DEUDAS -->
    <div id="page-deudas" class="page">
      <div class="page-header">
        <div>
          <div class="page-title">Mis Deudas</div>
          <div class="page-subtitle" id="deudas-subtitle">0 deudas registradas</div>
        </div>
      </div>
      <div id="debt-list"></div>
    </div>

    <!-- PLAN -->
    <div id="page-plan" class="page">
      <div class="page-header">
        <div>
          <div class="page-title">Plan Bola de Nieve</div>
          <div class="page-subtitle">Tu ruta a la libertad financiera</div>
        </div>
        <div style="font-size:22px">🏔️</div>
      </div>

      <div class="plan-input-row">
        <div class="form-group">
          <label class="form-label">Pago mensual disponible</label>
          <input id="pago-mensual" type="number" class="form-input" placeholder="0.00" min="0" step="0.01"/>
        </div>
        <button class="btn btn-primary" style="width:auto;padding:12px 20px;flex-shrink:0" onclick="calcularPlan()">
          Calcular
        </button>
      </div>

      <div id="plan-result"></div>
    </div>

  </div>

  <!-- ══ BOTTOM TABS ══════════════════════ -->
  <nav id="tabs">
    <button class="tab active" onclick="navTo('dashboard',this)">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      Dashboard
    </button>
    <button class="tab" onclick="navTo('deudas',this)">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M12 6v6l4 2"/></svg>
      Deudas
    </button>
    <button class="tab" onclick="navTo('plan',this)">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Plan
    </button>
  </nav>

  <!-- FAB -->
  <button id="fab" onclick="openModal()">+</button>

</div>

<!-- ══ MODAL DEUDA ══════════════════════════ -->
<div id="overlay" class="overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Nueva Deuda</div>

    <div class="form-group">
      <label class="form-label">Acreedor / Nombre</label>
      <input id="f-acreedor" type="text" class="form-input" placeholder="Ej: Banco, Tarjeta Visa..."/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Monto original</label>
        <input id="f-original" type="number" class="form-input" placeholder="0.00" min="0" step="0.01"/>
      </div>
      <div class="form-group">
        <label class="form-label">Saldo actual</label>
        <input id="f-actual" type="number" class="form-input" placeholder="0.00" min="0" step="0.01"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Pago mínimo / mes</label>
        <input id="f-minimo" type="number" class="form-input" placeholder="0.00" min="0" step="0.01"/>
      </div>
      <div class="form-group">
        <label class="form-label">Tasa interés % anual</label>
        <input id="f-interes" type="number" class="form-input" placeholder="Opcional" min="0" step="0.01"/>
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" style="flex:2" onclick="guardarDeuda()">Guardar</button>
    </div>
    <div id="modal-delete-btn" style="margin-top:10px;display:none">
      <button class="btn btn-danger" onclick="eliminarDeudaActual()">Eliminar deuda</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ══════════════════════════════════════════
//  ESTADO Y PERSISTENCIA
// ══════════════════════════════════════════
let deudas = [];
let editingId = null;
let pieChart = null;

const STORAGE_KEY = 'snowball_deudas_v1';

function cargar() {
  try { deudas = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { deudas = []; }
}
function guardar() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(deudas));
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}
function fmt(n) {
  return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n);
}
function fmtShort(n) {
  if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + Math.round(n);
}

// ══════════════════════════════════════════
//  NAVEGACIÓN
// ══════════════════════════════════════════
function navTo(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  btn.classList.add('active');

  const fab = document.getElementById('fab');
  fab.classList.toggle('hidden', page !== 'deudas');

  if (page === 'dashboard') renderDashboard();
  if (page === 'deudas') renderDeudas();
}

// ══════════════════════════════════════════
//  DASHBOARD
// ══════════════════════════════════════════
function renderDashboard() {
  const total = deudas.reduce((s, d) => s + d.actual, 0);
  const pagos = deudas.reduce((s, d) => s + d.minimo, 0);
  const objetivo = deudas.length ? [...deudas].sort((a,b) => a.actual - b.actual)[0] : null;
  const progTotal = deudas.length
    ? deudas.reduce((s,d) => s + (d.original - d.actual), 0) / deudas.reduce((s,d) => s + d.original, 0) * 100
    : 0;

  document.getElementById('dash-subtitle').textContent =
    deudas.length ? `${deudas.length} deuda${deudas.length>1?'s':''} activa${deudas.length>1?'s':''}` : 'sin deudas registradas';

  // KPIs
  const grid = document.getElementById('kpi-grid');
  grid.innerHTML = `
    <div class="kpi">
      <div class="kpi-label">Total deudas</div>
      <div class="kpi-value" style="font-size:17px">${fmtShort(total)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Pagos / mes</div>
      <div class="kpi-value warn" style="font-size:17px">${fmtShort(pagos)}</div>
    </div>
    <div class="kpi snowball-target" style="grid-column:span 2">
      <div class="kpi-label">🎯 Objetivo bola de nieve</div>
      <div class="kpi-value accent">${objetivo ? objetivo.acreedor : '—'}</div>
      ${objetivo ? `<div style="font-size:11px;color:var(--text2);margin-top:4px;font-family:'DM Mono',monospace">${fmt(objetivo.actual)} restante</div>` : ''}
    </div>
  `;

  // Progreso
  const ps = document.getElementById('progress-section');
  if (!deudas.length) {
    ps.innerHTML = '<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Agrega deudas para ver el progreso</div></div>';
  } else {
    const sorted = [...deudas].sort((a,b) => a.actual - b.actual);
    ps.innerHTML = sorted.map(d => {
      const pct = Math.max(0, Math.min(100, (d.original - d.actual) / d.original * 100));
      return `
        <div class="progress-row">
          <div class="progress-label">
            <span style="font-weight:600">${d.acreedor}</span>
            <span style="color:var(--text2);font-family:'DM Mono',monospace">${Math.round(pct)}%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>
        </div>
      `;
    }).join('');
  }

  // Gráfica pastel
  const ctx = document.getElementById('chart-pie').getContext('2d');
  if (pieChart) pieChart.destroy();

  if (!deudas.length) {
    ctx.clearRect(0,0,400,200);
    return;
  }

  const COLORS = ['#20d68a','#3b82f6','#f59e0b','#f87171','#a78bfa','#34d399','#60a5fa','#fbbf24'];
  pieChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: deudas.map(d => d.acreedor),
      datasets: [{
        data: deudas.map(d => d.actual),
        backgroundColor: COLORS.slice(0, deudas.length),
        borderColor: '#0d1828',
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: '#6b8aaa', font: { size: 11 }, padding: 12 }
        },
        tooltip: {
          callbacks: {
            label: ctx => ' ' + fmt(ctx.parsed)
          }
        }
      },
      cutout: '60%',
    }
  });
}

// ══════════════════════════════════════════
//  DEUDAS
// ══════════════════════════════════════════
const EMOJIS = ['💳','🏦','🏠','🚗','📱','💊','🎓','💼','🔑','⚡'];

function renderDeudas() {
  const list = document.getElementById('debt-list');
  const sub  = document.getElementById('deudas-subtitle');
  sub.textContent = `${deudas.length} deuda${deudas.length!==1?'s':''} registrada${deudas.length!==1?'s':''}`;

  if (!deudas.length) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">💸</div>
        <div class="empty-text">No tienes deudas registradas.<br>Toca <strong>+</strong> para agregar tu primera deuda.</div>
      </div>`;
    return;
  }

  const sorted = [...deudas].sort((a,b) => a.actual - b.actual);
  list.innerHTML = sorted.map((d, i) => {
    const pct = Math.max(0, Math.min(100, (d.original - d.actual) / d.original * 100));
    const isTarget = i === 0;
    return `
      <div class="debt-item ${isTarget ? 'snowball-target' : ''}">
        <div class="debt-icon">${EMOJIS[i % EMOJIS.length]}</div>
        <div class="debt-info">
          <div class="debt-name">${d.acreedor} ${isTarget ? '<span class="badge badge-green">🎯 objetivo</span>' : ''}</div>
          <div class="debt-details">Mín: ${fmtShort(d.minimo)}/mes · ${Math.round(pct)}% pagado${d.interes ? ' · ' + d.interes + '%' : ''}</div>
          <div style="margin-top:5px">
            <div class="progress-track" style="height:4px">
              <div class="progress-fill" style="width:${pct}%"></div>
            </div>
          </div>
        </div>
        <div>
          <div class="debt-amount">${fmtShort(d.actual)}</div>
          <div class="debt-actions" style="margin-top:6px;justify-content:flex-end">
            <button class="btn-icon" onclick="editarDeuda('${d.id}')">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ══════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════
function openModal(id = null) {
  editingId = id;
  const overlay = document.getElementById('overlay');
  const title   = document.getElementById('modal-title');
  const delBtn  = document.getElementById('modal-delete-btn');

  if (id) {
    const d = deudas.find(x => x.id === id);
    title.textContent = 'Editar Deuda';
    document.getElementById('f-acreedor').value = d.acreedor;
    document.getElementById('f-original').value = d.original;
    document.getElementById('f-actual').value   = d.actual;
    document.getElementById('f-minimo').value   = d.minimo;
    document.getElementById('f-interes').value  = d.interes || '';
    delBtn.style.display = 'block';
  } else {
    title.textContent = 'Nueva Deuda';
    ['f-acreedor','f-original','f-actual','f-minimo','f-interes'].forEach(id => document.getElementById(id).value = '');
    delBtn.style.display = 'none';
  }

  overlay.classList.add('open');
  document.getElementById('f-acreedor').focus();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editingId = null;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function editarDeuda(id) { openModal(id); }

function guardarDeuda() {
  const acreedor = document.getElementById('f-acreedor').value.trim();
  const original = parseFloat(document.getElementById('f-original').value);
  const actual   = parseFloat(document.getElementById('f-actual').value);
  const minimo   = parseFloat(document.getElementById('f-minimo').value);
  const interes  = parseFloat(document.getElementById('f-interes').value) || null;

  if (!acreedor || isNaN(original) || isNaN(actual) || isNaN(minimo)) {
    toast('⚠️ Completa los campos requeridos');
    return;
  }
  if (actual > original) {
    toast('⚠️ El saldo actual no puede superar el monto original');
    return;
  }
  if (minimo <= 0) {
    toast('⚠️ El pago mínimo debe ser mayor a 0');
    return;
  }

  if (editingId) {
    const idx = deudas.findIndex(d => d.id === editingId);
    deudas[idx] = { ...deudas[idx], acreedor, original, actual, minimo, interes };
    toast('✅ Deuda actualizada');
  } else {
    deudas.push({ id: uid(), acreedor, original, actual, minimo, interes });
    toast('✅ Deuda agregada');
  }

  guardar();
  closeModal();
  renderDeudas();
}

function eliminarDeudaActual() {
  if (!editingId) return;
  deudas = deudas.filter(d => d.id !== editingId);
  guardar();
  closeModal();
  renderDeudas();
  toast('🗑️ Deuda eliminada');
}

// ══════════════════════════════════════════
//  ALGORITMO BOLA DE NIEVE
// ══════════════════════════════════════════
function calcularBolaDeNieve(deudasInput, pagoMensualTotal) {
  // Clonar deudas con saldos actuales
  let lista = deudasInput.map(d => ({ ...d, saldo: d.actual }))
                         .sort((a, b) => a.saldo - b.saldo);

  const cronograma = [];
  let mes = 0;
  const MAX_MESES = 360;
  let totalIntereses = 0;

  while (lista.some(d => d.saldo > 0) && mes < MAX_MESES) {
    mes++;
    // 1. Aplicar intereses
    lista.forEach(d => {
      if (d.interes && d.saldo > 0) {
        const interesMes = d.saldo * (d.interes / 100 / 12);
        d.saldo += interesMes;
        totalIntereses += interesMes;
      }
    });

    // 2. Calcular pagos mínimos totales
    const minimosTotales = lista.filter(d => d.saldo > 0).reduce((s, d) => s + d.minimo, 0);
    let excedente = Math.max(0, pagoMensualTotal - minimosTotales);

    const pagosDelMes = [];

    lista.forEach((d, i) => {
      if (d.saldo <= 0) return;

      let pago = Math.min(d.minimo, d.saldo);

      // El excedente va íntegro a la primera deuda activa (la más pequeña)
      const esObjetivo = lista.findIndex(x => x.saldo > 0) === i;
      if (esObjetivo && excedente > 0) {
        pago = Math.min(d.saldo, pago + excedente);
        excedente = 0;
      }

      d.saldo = Math.max(0, d.saldo - pago);

      // Si se liquidó, el pago extra pasa al siguiente
      if (d.saldo === 0 && excedente === 0) {
        excedente = d.minimo; // su mínimo queda libre para el siguiente
      }

      pagosDelMes.push({
        acreedor: d.acreedor,
        pago,
        saldo: d.saldo,
        liquidada: d.saldo === 0,
      });
    });

    cronograma.push({ mes, pagos: pagosDelMes });

    // Redistribuir mínimos de deudas liquidadas
    lista.forEach(d => { if (d.saldo <= 0) d.minimo = 0; });
  }

  return { cronograma, meses: mes, totalIntereses };
}

function calcularPlan() {
  const pago = parseFloat(document.getElementById('pago-mensual').value);
  const result = document.getElementById('plan-result');

  if (!deudas.length) {
    result.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Agrega deudas primero</div></div>';
    return;
  }
  if (isNaN(pago) || pago <= 0) {
    toast('⚠️ Ingresa cuánto puedes pagar al mes');
    return;
  }

  const minimos = deudas.reduce((s, d) => s + d.minimo, 0);
  if (pago < minimos) {
    result.innerHTML = `
      <div class="card" style="border-color:var(--red)">
        <div style="color:var(--red);font-weight:600;margin-bottom:6px">⚠️ Pago insuficiente</div>
        <div style="font-size:13px;color:var(--text2)">El mínimo para cubrir todos los pagos es <strong style="color:var(--text)">${fmt(minimos)}</strong>.</div>
      </div>`;
    return;
  }

  const { cronograma, meses, totalIntereses } = calcularBolaDeNieve(deudas, pago);

  // Fecha estimada
  const hoy = new Date();
  const libre = new Date(hoy.setMonth(hoy.getMonth() + meses));
  const fechaStr = libre.toLocaleDateString('es-CO', { month: 'long', year: 'numeric' });

  const años = Math.floor(meses / 12);
  const mesesResto = meses % 12;
  const duracion = [años && `${años} año${años>1?'s':''}`, mesesResto && `${mesesResto} mes${mesesResto>1?'es':''}`].filter(Boolean).join(' y ');

  result.innerHTML = `
    <div class="kpi-grid" style="margin-bottom:16px">
      <div class="kpi">
        <div class="kpi-label">Meses hasta libertad</div>
        <div class="kpi-value accent">${meses}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Duración</div>
        <div class="kpi-value" style="font-size:14px">${duracion}</div>
      </div>
      <div class="kpi" style="grid-column:span 2">
        <div class="kpi-label">🎉 Fecha estimada de libertad</div>
        <div class="kpi-value accent" style="font-size:18px;text-transform:capitalize">${fechaStr}</div>
      </div>
      ${totalIntereses > 0 ? `
      <div class="kpi" style="grid-column:span 2">
        <div class="kpi-label">Total intereses pagados</div>
        <div class="kpi-value warn">${fmt(totalIntereses)}</div>
      </div>` : ''}
    </div>

    <div class="section-label">Cronograma mes a mes</div>
    <div class="card" style="padding:0;overflow:hidden;overflow-x:auto">
      <table class="cronograma-table">
        <thead>
          <tr>
            <th>Mes</th>
            <th>Deuda atacada</th>
            <th>Pago</th>
            <th>Saldo</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
          ${cronograma.map(m => {
            // Mostrar fila por deuda objetivo de cada mes
            const objetivo = m.pagos.find(p => p.pago === Math.max(...m.pagos.map(x => x.pago)));
            return m.pagos.map(p => `
              <tr>
                <td style="color:var(--text2)">${m.mes}</td>
                <td style="font-weight:${p === objetivo?'600':'400'}">${p.acreedor}</td>
                <td>${fmtShort(p.pago)}</td>
                <td style="color:${p.saldo===0?'var(--green)':'var(--text)'}">${fmtShort(p.saldo)}</td>
                <td>${p.saldo === 0 ? '<span class="tag-paid">✓ Pagada</span>' : '<span class="tag-active">activa</span>'}</td>
              </tr>
            `).join('');
          }).join('')}
        </tbody>
      </table>
    </div>

    <div style="margin-top:14px">
      <button class="btn btn-secondary" onclick="imprimirPlan()" style="font-size:13px;padding:11px">
        🖨️ Exportar / Imprimir plan
      </button>
    </div>
  `;
}

function imprimirPlan() {
  window.print();
}

// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

cargar();
renderDashboard();
