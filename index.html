<!DOCTYPE html>
<html lang="es">
<head>
<!--
  ╔══════════════════════════════════════════════════════╗
  ║         SNOWBALL — Gestor de Deudas Personal         ║
  ╠══════════════════════════════════════════════════════╣
  ║  Android: Chrome → ⋮ → "Añadir a pantalla de inicio" ║
  ║  iPhone:  Safari → □↑ → "Añadir a pantalla de inicio"║
  ╚══════════════════════════════════════════════════════╝
-->
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#05111f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Snowball"/>
<title>Snowball</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./apple-touch-icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── TOKENS ─────────────────────────────────────── */
:root{
  --bg:      #05111f;
  --bg2:     #091929;
  --bg3:     #0d2035;
  --bg4:     #112540;
  --border:  #1b3450;
  --border2: #254d75;
  --green:   #00e5a0;
  --green2:  #00a872;
  --green3:  #004d34;
  --red:     #ff6b6b;
  --red2:    #3d1010;
  --yellow:  #ffd166;
  --blue:    #4da8ff;
  --purple:  #b48dff;
  --text:    #ddeeff;
  --text2:   #527a9e;
  --text3:   #2d5070;
  --r:       18px;
  --r2:      12px;
  --font:    'Inter', system-ui, sans-serif;
  --mono:    'JetBrains Mono', monospace;
  --display: 'Syne', sans-serif;
}

/* ── RESET ──────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  font-size:14px;
  line-height:1.5;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
}

/* ── LAYOUT ─────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;position:relative;overflow:hidden}
#pages{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.page{display:none;padding:0 0 90px;animation:pageIn .3s cubic-bezier(.2,0,.2,1)}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── PAGE HERO ──────────────────────────────────── */
.hero{
  padding:52px 20px 28px;
  background:linear-gradient(180deg,rgba(0,229,160,.06) 0%,transparent 100%);
  border-bottom:1px solid var(--border);
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';
  position:absolute;
  top:-60px;right:-60px;
  width:220px;height:220px;
  background:radial-gradient(circle,rgba(0,229,160,.08) 0%,transparent 70%);
  pointer-events:none;
}
.hero-label{
  font-family:var(--font);
  font-size:11px;
  font-weight:600;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--green);
  margin-bottom:6px;
}
.hero-title{
  font-family:var(--display);
  font-size:28px;
  font-weight:800;
  letter-spacing:-.5px;
  line-height:1.1;
  color:#fff;
}
.hero-sub{font-size:13px;color:var(--text2);margin-top:6px}

/* ── SECTION ────────────────────────────────────── */
.section{padding:20px 16px 0}
.section-title{
  font-family:var(--display);
  font-size:13px;
  font-weight:700;
  letter-spacing:.5px;
  text-transform:uppercase;
  color:var(--text2);
  margin-bottom:14px;
  display:flex;
  align-items:center;
  gap:8px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── KPI STRIP ──────────────────────────────────── */
.kpi-strip{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  padding:16px;
  border-bottom:1px solid var(--border);
}
.kpi-pill{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--r2);
  padding:12px 10px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.kpi-pill::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:2px;
}
.kpi-pill.g::after{background:var(--green)}
.kpi-pill.y::after{background:var(--yellow)}
.kpi-pill.b::after{background:var(--blue)}
.kpi-pill-val{
  font-family:var(--mono);
  font-size:16px;
  font-weight:500;
  color:#fff;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.kpi-pill.g .kpi-pill-val{color:var(--green)}
.kpi-pill.y .kpi-pill-val{color:var(--yellow)}
.kpi-pill.b .kpi-pill-val{color:var(--blue)}
.kpi-pill-lbl{font-size:10px;color:var(--text2);margin-top:3px;letter-spacing:.3px}

/* ── TARGET CARD ────────────────────────────────── */
.target-card{
  margin:16px;
  background:linear-gradient(135deg,rgba(0,229,160,.1),rgba(0,229,160,.03));
  border:1px solid rgba(0,229,160,.25);
  border-radius:var(--r);
  padding:16px 18px;
  display:flex;
  align-items:center;
  gap:14px;
}
.target-orb{
  width:48px;height:48px;
  border-radius:14px;
  background:rgba(0,229,160,.12);
  border:1px solid rgba(0,229,160,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  flex-shrink:0;
}
.target-label{font-size:11px;color:var(--green);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px}
.target-name{font-family:var(--display);font-size:17px;font-weight:700;color:#fff}
.target-amount{font-family:var(--mono);font-size:13px;color:var(--text2);margin-top:2px}

/* ── PROGRESS BARS ──────────────────────────────── */
.prog-item{margin-bottom:16px}
.prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.prog-name{font-size:13px;font-weight:600;color:var(--text)}
.prog-pct{font-family:var(--mono);font-size:12px;color:var(--text2)}
.prog-bar{height:5px;background:var(--bg4);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.prog-fill.active{background:linear-gradient(90deg,var(--green2),var(--green))}
.prog-fill.done{background:var(--green)}
.prog-sub{font-size:11px;color:var(--text3);margin-top:4px;font-family:var(--mono)}

/* ── MONTHLY SUMMARY ────────────────────────────── */
.month-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  margin-bottom:10px;
}
.month-header{
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.month-name{font-weight:600;font-size:13px;text-transform:capitalize}
.month-total{font-family:var(--mono);font-size:13px;color:var(--green);font-weight:500}
.month-body{
  border-top:1px solid var(--border);
  padding:10px 16px;
  display:none;
}
.month-body.open{display:block}
.month-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(27,52,80,.4)}
.month-row:last-child{border-bottom:none}
.month-row-name{color:var(--text2)}
.month-row-val{font-family:var(--mono);color:var(--text)}

/* ── DEBT CARD ──────────────────────────────────── */
.debt-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--r);
  margin-bottom:10px;
  overflow:hidden;
  transition:border-color .2s;
}
.debt-card.target{border-color:rgba(0,229,160,.3);background:linear-gradient(135deg,rgba(0,229,160,.04),var(--bg2))}
.debt-card.done{opacity:.65}
.debt-card-top{padding:14px 14px 10px;display:flex;gap:12px;align-items:flex-start}
.debt-badge{
  width:38px;height:38px;
  border-radius:10px;
  background:var(--bg3);
  border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.debt-main{flex:1;min-width:0}
.debt-name-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.debt-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.2px;flex-shrink:0}
.chip-green{background:rgba(0,229,160,.12);color:var(--green);border:1px solid rgba(0,229,160,.2)}
.chip-gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.chip-red{background:rgba(255,107,107,.1);color:var(--red);border:1px solid rgba(255,107,107,.15)}
.debt-meta{font-size:11px;color:var(--text2);font-family:var(--mono);margin-bottom:8px}
.debt-prog-bar{height:4px;background:var(--bg4);border-radius:99px;overflow:hidden;margin-bottom:3px}
.debt-prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green2),var(--green));transition:width .6s}
.debt-prog-nums{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);font-family:var(--mono)}
.debt-amount-col{text-align:right;flex-shrink:0}
.debt-amount{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--red)}
.debt-amount.done{color:var(--green)}
.debt-edit-btn{
  width:28px;height:28px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--bg3);
  color:var(--text2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;margin-top:4px;
  -webkit-tap-highlight-color:transparent;
}
.debt-note{
  margin:0 14px 10px;
  padding:8px 12px;
  background:var(--bg3);
  border-left:2px solid var(--border2);
  border-radius:0 8px 8px 0;
  font-size:12px;
  color:var(--text2);
  font-style:italic;
}
.debt-deadline{
  margin:0 14px 10px;
  padding:7px 12px;
  background:rgba(255,209,102,.06);
  border:1px solid rgba(255,209,102,.15);
  border-radius:8px;
  font-size:11px;
  color:var(--yellow);
  display:flex;align-items:center;gap:6px;
}
.debt-footer{
  border-top:1px solid var(--border);
  padding:10px 14px;
  display:flex;gap:7px;flex-wrap:wrap;
}

/* ── BUTTONS ────────────────────────────────────── */
.btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;padding:13px;
  border-radius:var(--r2);border:none;
  font-family:var(--font);font-size:14px;font-weight:600;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:opacity .15s,transform .1s;
}
.btn:active{opacity:.8;transform:scale(.98)}
.btn-primary{background:var(--green);color:#011a0e}
.btn-secondary{background:var(--bg3);border:1px solid var(--border);color:var(--text)}
.btn-danger{background:var(--red2);border:1px solid rgba(255,107,107,.2);color:var(--red)}
.btn-sm{padding:8px 13px;font-size:12px;border-radius:9px;width:auto}
.btn-ghost-green{background:rgba(0,229,160,.09);border:1px solid rgba(0,229,160,.2);color:var(--green);font-size:12px;padding:7px 12px;border-radius:8px;font-weight:600;cursor:pointer;font-family:var(--font);-webkit-tap-highlight-color:transparent}
.btn-ghost-blue{background:rgba(77,168,255,.09);border:1px solid rgba(77,168,255,.2);color:var(--blue);font-size:12px;padding:7px 12px;border-radius:8px;font-weight:600;cursor:pointer;font-family:var(--font);-webkit-tap-highlight-color:transparent}
.btn-ghost-purple{background:rgba(180,141,255,.09);border:1px solid rgba(180,141,255,.2);color:var(--purple);font-size:12px;padding:7px 12px;border-radius:8px;font-weight:600;cursor:pointer;font-family:var(--font);-webkit-tap-highlight-color:transparent}

/* ── FAB ────────────────────────────────────────── */
#fab{
  position:fixed;bottom:76px;right:16px;
  width:50px;height:50px;border-radius:14px;
  background:var(--green);border:none;color:#011a0e;
  font-size:24px;font-weight:400;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 28px rgba(0,229,160,.3);
  cursor:pointer;z-index:20;
  -webkit-tap-highlight-color:transparent;
  transition:transform .15s,box-shadow .15s;
}
#fab:active{transform:scale(.9);box-shadow:0 2px 10px rgba(0,229,160,.2)}
#fab.hidden{display:none}

/* ── TABS ───────────────────────────────────────── */
#tabs{
  display:flex;
  background:var(--bg2);
  border-top:1px solid var(--border);
  padding:6px 0 max(6px,env(safe-area-inset-bottom));
  z-index:10;
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 0;background:none;border:none;
  color:var(--text2);font-family:var(--font);font-size:10px;font-weight:500;
  cursor:pointer;-webkit-tap-highlight-color:transparent;transition:color .2s;
}
.tab svg{transition:transform .2s}
.tab.active{color:var(--green)}
.tab.active svg{transform:translateY(-2px)}

/* ── OVERLAY / MODAL ────────────────────────────── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.8);
  backdrop-filter:blur(6px);
  z-index:50;display:none;
  align-items:flex-end;justify-content:center;
}
.overlay.open{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:24px 24px 0 0;
  padding:18px 18px max(18px,env(safe-area-inset-bottom));
  width:100%;max-width:430px;
  animation:slideUp .28s cubic-bezier(.3,0,.2,1);
  max-height:94dvh;overflow-y:auto;
}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:32px;height:4px;background:var(--border2);border-radius:99px;margin:0 auto 18px}
.modal-title{font-family:var(--display);font-size:18px;font-weight:700;margin-bottom:18px;text-align:center;color:#fff}

/* ── FORM ───────────────────────────────────────── */
.fg{margin-bottom:13px}
.fl{display:block;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;font-weight:500}
.fi{
  width:100%;background:var(--bg3);
  border:1px solid var(--border);border-radius:10px;
  padding:11px 13px;color:var(--text);
  font-family:var(--font);font-size:14px;outline:none;
  transition:border-color .2s;
  -webkit-appearance:none;
}
.fi:focus{border-color:var(--green)}
.fi::placeholder{color:var(--text3)}
textarea.fi{resize:none;min-height:72px;line-height:1.5}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fi-row{display:flex;gap:8px}
.fi-row .fi{flex:1}
.btn-inline{
  background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.25);
  color:var(--green);border-radius:10px;padding:0 14px;
  font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;
  font-family:var(--font);-webkit-tap-highlight-color:transparent;
  flex-shrink:0;
}

/* ── PAYMENT HISTORY ────────────────────────────── */
.pay-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 0;border-bottom:1px solid rgba(27,52,80,.5);
}
.pay-item:last-child{border-bottom:none}
.pay-line{width:2px;height:36px;border-radius:99px;background:var(--green);flex-shrink:0}
.pay-info{flex:1;min-width:0}
.pay-amount{font-family:var(--mono);font-weight:500;font-size:14px;color:var(--green)}
.pay-date{font-size:11px;color:var(--text2);margin-top:1px}
.pay-note{font-size:11px;color:var(--text2);font-style:italic;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pay-acts{display:flex;gap:5px;flex-shrink:0}
.icon-btn{
  width:28px;height:28px;border-radius:7px;
  border:1px solid var(--border);background:var(--bg3);
  color:var(--text2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.icon-btn:active{background:var(--bg4)}

/* ── PLAN / SCHEDULE ────────────────────────────── */
.plan-hero{
  background:linear-gradient(135deg,rgba(0,229,160,.08),rgba(77,168,255,.04));
  border:1px solid rgba(0,229,160,.15);
  border-radius:var(--r);padding:18px;margin-bottom:14px;
}
.plan-stat{margin-bottom:8px}
.plan-stat:last-child{margin-bottom:0}
.plan-stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:2px}
.plan-stat-value{font-family:var(--display);font-size:22px;font-weight:700;color:var(--green)}
.plan-stat-value.white{color:#fff}
.sched-table{width:100%;border-collapse:collapse;font-size:11px}
.sched-table th{text-align:left;color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.4px;padding:8px 8px;border-bottom:1px solid var(--border);font-weight:500}
.sched-table td{padding:8px 8px;border-bottom:1px solid rgba(27,52,80,.4);font-family:var(--mono)}
.sched-table tr:last-child td{border-bottom:none}
.tag-done{background:rgba(0,229,160,.12);color:var(--green);border-radius:5px;padding:2px 6px;font-size:10px;font-weight:600}
.tag-act{background:rgba(255,209,102,.1);color:var(--yellow);border-radius:5px;padding:2px 6px;font-size:10px;font-weight:600}

/* ── CONFIRM ────────────────────────────────────── */
#conf-ov{
  position:fixed;inset:0;
  background:rgba(0,0,0,.85);backdrop-filter:blur(6px);
  z-index:80;display:none;align-items:center;justify-content:center;padding:20px;
}
#conf-ov.open{display:flex;animation:fadeIn .2s ease}
.conf-box{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:20px;padding:26px 22px;
  width:100%;max-width:320px;text-align:center;
}
.conf-icon{font-size:36px;margin-bottom:12px}
.conf-title{font-family:var(--display);font-size:17px;font-weight:700;margin-bottom:8px;color:#fff}
.conf-msg{font-size:13px;color:var(--text2);line-height:1.55;margin-bottom:20px}
.conf-acts{display:flex;gap:10px}

/* ── EMPTY ──────────────────────────────────────── */
.empty{text-align:center;padding:44px 20px;color:var(--text2)}
.empty-icon{font-size:46px;margin-bottom:12px;opacity:.6}
.empty-text{font-size:13px;line-height:1.7}

/* ── TOAST ──────────────────────────────────────── */
#toast{
  position:fixed;bottom:86px;left:50%;transform:translateX(-50%);
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);padding:10px 18px;border-radius:99px;
  font-size:13px;font-weight:500;z-index:100;
  white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none;
  max-width:calc(100vw - 32px);overflow:hidden;text-overflow:ellipsis;
}
#toast.show{opacity:1}

/* ── MISC ───────────────────────────────────────── */
.divider{height:1px;background:var(--border);margin:14px 0}
.saldo-info{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:10px 13px;margin-bottom:12px;
}
.saldo-info-label{font-size:12px;color:var(--text2)}
.saldo-info-val{font-family:var(--mono);font-weight:500;font-size:14px;color:var(--red)}

@media print{
  #tabs,#fab,.overlay,#toast,#conf-ov,.debt-footer,.debt-edit-btn{display:none!important}
  body{background:#fff;color:#000}
  .debt-card,.plan-hero,.month-card{border:1px solid #ddd;background:#fff}
  *{color:#111!important}
  .page{display:block!important;padding-bottom:20px!important}
}
</style>
</head>
<body>
<div id="app">
<div id="pages">

<!-- ══ DASHBOARD ══════════════════════════════════ -->
<div id="page-dashboard" class="page active">
  <div class="hero">
    <div class="hero-label">❄️ Snowball</div>
    <div class="hero-title" id="dash-title">Mis Finanzas</div>
    <div class="hero-sub" id="dash-sub">cargando...</div>
  </div>

  <div class="kpi-strip" id="kpi-strip"></div>

  <div id="target-wrap"></div>

  <div class="section">

<script>
// ══════════════════════════════════════════════════
//  ESTADO
// ══════════════════════════════════════════════════
let deudas = [];
let editingDeudaId = null;
let pagoDeudaId    = null;
let editingPagoId  = null;
let histDeudaId    = null;
let pieChart       = null;

const SK = 'snowball_v3';

function load()  { try{ deudas=JSON.parse(localStorage.getItem(SK))||[]; }catch{ deudas=[]; } }
function save()  { localStorage.setItem(SK,JSON.stringify(deudas)); }
function uid()   { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function today() { return new Date().toISOString().slice(0,10); }

function fmt(n){
  if(n>=1e6) return '$'+(n/1e6).toFixed(1)+'M';
  if(n>=1e3) return '$'+(n/1e3).toFixed(0)+'K';
  return '$'+Math.round(n);
}
function fmtFull(n){
  return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n);
}
function fmtDate(s){
  if(!s)return'';
  const[y,m,d]=s.split('-');
  return`${d}/${m}/${y}`;
}
function saldoReal(d){
  return Math.max(0, d.actual - (d.pagos||[]).reduce((s,p)=>s+p.monto,0));
}
function diasHastaFecha(fecha){
  if(!fecha)return null;
  const diff=new Date(fecha+' 00:00')-new Date();
  return Math.ceil(diff/86400000);
}

// ══════════════════════════════════════════════════
//  NAVEGACIÓN
// ══════════════════════════════════════════════════
function navTo(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  btn.classList.add('active');
  document.getElementById('fab').classList.toggle('hidden',page!=='deudas');
  if(page==='dashboard') renderDashboard();
  if(page==='deudas')    renderDeudas();
  if(page==='stats')     renderStats();
}

// ══════════════════════════════════════════════════
//  MODALES
// ══════════════════════════════════════════════════
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function closeIfOut(e,id){ if(e.target.id===id) closeModal(id); }

function showConf(icon,title,msg,cb){
  document.getElementById('conf-icon').textContent=icon;
  document.getElementById('conf-title').textContent=title;
  document.getElementById('conf-msg').textContent=msg;
  document.getElementById('conf-ok').onclick=()=>{cb();closeConf();};
  document.getElementById('conf-ov').classList.add('open');
}
function closeConf(){ document.getElementById('conf-ov').classList.remove('open'); }

// ══════════════════════════════════════════════════
//  DASHBOARD
// ══════════════════════════════════════════════════
const EMOJIS=['💳','🏦','🏠','🚗','📱','💊','🎓','💼','🔑','⚡','🛒','📺'];

function renderDashboard(){
  const activos=deudas.filter(d=>saldoReal(d)>0);
  const total  =activos.reduce((s,d)=>s+saldoReal(d),0);
  const pagos  =deudas.reduce((s,d)=>s+d.minimo,0);
  const totalPagado=deudas.reduce((s,d)=>(d.pagos||[]).reduce((a,p)=>a+p.monto,0)+s,0);
  const objetivo=activos.length?[...activos].sort((a,b)=>saldoReal(a)-saldoReal(b))[0]:null;

  // Hero
  const ahora=new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('dash-title').textContent=deudas.length?'Mis Finanzas':'¡Bienvenido!';
  document.getElementById('dash-sub').textContent=activos.length
    ?`${activos.length} deuda${activos.length!==1?'s':''} activa${activos.length!==1?'s':''} · ${ahora}`
    :'Sin deudas activas · '+ahora;

  // KPIs
  document.getElementById('kpi-strip').innerHTML=`
    <div class="kpi-pill r">
      <div class="kpi-pill-val">${fmt(total)}</div>
      <div class="kpi-pill-lbl">Pendiente</div>
    </div>
    <div class="kpi-pill g">
      <div class="kpi-pill-val">${fmt(totalPagado)}</div>
      <div class="kpi-pill-lbl">Pagado</div>
    </div>
    <div class="kpi-pill y">
      <div class="kpi-pill-val">${fmt(pagos)}</div>
      <div class="kpi-pill-lbl">Mín/mes</div>
    </div>`;

  // Target card
  const tw=document.getElementById('target-wrap');
  if(objetivo){
    const sr=saldoReal(objetivo);
    const dias=diasHastaFecha(objetivo.meta);
    tw.innerHTML=`<div class="target-card">
      <div class="target-orb">🎯</div>
      <div style="flex:1;min-width:0">
        <div class="target-label">Objetivo bola de nieve</div>
        <div class="target-name">${objetivo.acreedor}</div>
        <div class="target-amount">${fmtFull(sr)} restante${dias!==null?` · ${dias>0?dias+' días':dias===0?'¡Hoy!':'¡Vencida!'}`:''}</div>
      </div>
    </div>`;
  } else {
    tw.innerHTML='';
  }

  // Progreso
  const dp=document.getElementById('dash-progress');
  if(!deudas.length){
    dp.innerHTML='<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Agrega deudas para ver el progreso</div></div>';
  } else {
    const sorted=[...deudas].sort((a,b)=>{
      const sa=saldoReal(a),sb=saldoReal(b);
      if(sa===0&&sb===0)return 0; if(sa===0)return 1; if(sb===0)return -1;
      return sa-sb;
    });
    dp.innerHTML=sorted.map(d=>{
      const sr=saldoReal(d);
      const pct=Math.max(0,Math.min(100,(d.original-sr)/d.original*100));
      return`<div class="prog-item">
        <div class="prog-top">
          <span class="prog-name">${d.acreedor}</span>
          <span class="prog-pct">${Math.round(pct)}%${sr===0?' ✓':''}</span>
        </div>
        <div class="prog-bar"><div class="prog-fill ${sr===0?'done':'active'}" style="width:${pct}%"></div></div>
        <div class="prog-sub">${fmtFull(sr)} restante de ${fmtFull(d.original)}</div>
      </div>`;
    }).join('');
  }

  // Chart
  const ctx=document.getElementById('chart-pie').getContext('2d');
  if(pieChart)pieChart.destroy();
  if(!deudas.length){ctx.clearRect(0,0,400,200);return;}
  const COLORS=['#00e5a0','#4da8ff','#ffd166','#ff6b6b','#b48dff','#00bfa5','#ff9f43','#a29bfe'];
  pieChart=new Chart(ctx,{
    type:'doughnut',
    data:{
      labels:deudas.map(d=>d.acreedor),
      datasets:[{data:deudas.map(d=>Math.max(saldoReal(d),0)),backgroundColor:COLORS.slice(0,deudas.length),borderColor:'#091929',borderWidth:3}]
    },
    options:{responsive:true,plugins:{
      legend:{position:'bottom',labels:{color:'#527a9e',font:{size:11,family:'Inter'},padding:14,boxWidth:10}},
      tooltip:{callbacks:{label:c=>' '+fmtFull(c.parsed)}}
    },cutout:'62%'}
  });
}

// ══════════════════════════════════════════════════
//  DEUDAS
// ══════════════════════════════════════════════════
function renderDeudas(){
  const list=document.getElementById('debt-list');
  document.getElementById('deudas-title').textContent=
    deudas.length?`${deudas.length} deuda${deudas.length!==1?'s':''}`:' Lista';
  document.getElementById('deudas-sub').textContent=
    `${deudas.filter(d=>saldoReal(d)>0).length} activa${deudas.filter(d=>saldoReal(d)>0).length!==1?'s':''}  ·  ${deudas.filter(d=>saldoReal(d)===0).length} liquidada${deudas.filter(d=>saldoReal(d)===0).length!==1?'s':''}`;

  if(!deudas.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">💸</div><div class="empty-text">Sin deudas registradas.<br>Toca <strong>+</strong> para agregar la primera.</div></div>`;
    return;
  }

  const sorted=[...deudas].sort((a,b)=>{
    const sa=saldoReal(a),sb=saldoReal(b);
    if(sa===0&&sb===0)return 0; if(sa===0)return 1; if(sb===0)return -1;
    return sa-sb;
  });

  list.innerHTML=sorted.map((d,i)=>{
    const sr=saldoReal(d);
    const pct=Math.max(0,Math.min(100,(d.original-sr)/d.original*100));
    const isTarget=i===0&&sr>0;
    const nPagos=(d.pagos||[]).length;
    const totalPagado=(d.pagos||[]).reduce((s,p)=>s+p.monto,0);
    const dias=diasHastaFecha(d.meta);

    let deadlineBadge='';
    if(d.meta&&sr>0){
      const color=dias<0?'var(--red)':dias<=7?'var(--yellow)':'var(--blue)';
      const label=dias<0?`Vencida hace ${Math.abs(dias)}d`:dias===0?'¡Hoy!':dias<=7?`${dias}d`:fmtDate(d.meta);
      deadlineBadge=`<div class="debt-deadline">⏰ Meta: <strong>${label}</strong></div>`;
    }

    const notaBlock=d.nota?`<div class="debt-note">💬 ${d.nota}</div>`:'';

    return`<div class="debt-card ${isTarget?'target':''} ${sr===0?'done':''}">
      <div class="debt-card-top">
        <div class="debt-badge">${EMOJIS[i%EMOJIS.length]}</div>
        <div class="debt-main">
          <div class="debt-name-row">
            <span class="debt-name">${d.acreedor}</span>
            ${isTarget?'<span class="chip chip-green">🎯 objetivo</span>':''}
            ${sr===0?'<span class="chip chip-green">✓ Pagada</span>':''}
            ${d.minimo===0&&sr>0?'<span class="chip chip-red">Vencida</span>':''}
          </div>
          <div class="debt-meta">
            ${d.minimo>0?`Mín ${fmt(d.minimo)}/mes · `:''}Pagado ${fmt(totalPagado)}${d.interes?` · ${d.interes}%`:''}
          </div>
          <div class="debt-prog-bar"><div class="debt-prog-fill" style="width:${pct}%"></div></div>
          <div class="debt-prog-nums"><span>${fmt(totalPagado)} abonado</span><span>${fmt(sr)} resta</span></div>
        </div>
        <div class="debt-amount-col">
          <div class="debt-amount ${sr===0?'done':''}">${sr===0?fmtFull(0):fmt(sr)}</div>
          <button class="debt-edit-btn" onclick="openDeudaModal('${d.id}')">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
        </div>
      </div>
      ${notaBlock}
      ${deadlineBadge}
      <div class="debt-footer">
        ${sr>0?`<button class="btn-ghost-green" onclick="openPagoModal('${d.id}')">+ Pago</button>`:''}
        ${nPagos?`<button class="btn-ghost-blue" onclick="openHistorial('${d.id}')">📋 Pagos (${nPagos})</button>`:''}
        ${d.nota||d.meta?`<button class="btn-ghost-purple" onclick="openDeudaModal('${d.id}')">📝 Editar nota</button>`:''}
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════
//  MODAL DEUDA
// ══════════════════════════════════════════════════
function openDeudaModal(id=null){
  editingDeudaId=id;
  document.getElementById('modal-deuda-title').textContent=id?'Editar Deuda':'Nueva Deuda';
  document.getElementById('btn-del-deuda').style.display=id?'block':'none';
  if(id){
    const d=deudas.find(x=>x.id===id);
    document.getElementById('f-acreedor').value=d.acreedor;
    document.getElementById('f-original').value=d.original;
    document.getElementById('f-actual').value=d.actual;
    document.getElementById('f-minimo').value=d.minimo;
    document.getElementById('f-interes').value=d.interes||'';
    document.getElementById('f-meta').value=d.meta||'';
    document.getElementById('f-nota').value=d.nota||'';
  } else {
    ['f-acreedor','f-original','f-actual','f-interes','f-meta','f-nota'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('f-minimo').value='';
  }
  document.getElementById('ov-deuda').classList.add('open');
  setTimeout(()=>document.getElementById('f-acreedor').focus(),220);
}

function guardarDeuda(){
  const acreedor=document.getElementById('f-acreedor').value.trim();
  const original=parseFloat(document.getElementById('f-original').value);
  const actual  =parseFloat(document.getElementById('f-actual').value);
  const minVal  =document.getElementById('f-minimo').value;
  const minimo  =minVal===''||isNaN(parseFloat(minVal))?0:parseFloat(minVal);
  const interes =parseFloat(document.getElementById('f-interes').value)||null;
  const meta    =document.getElementById('f-meta').value||null;
  const nota    =document.getElementById('f-nota').value.trim()||null;

  if(!acreedor||isNaN(original)||isNaN(actual)){toast('⚠️ Completa nombre y montos');return;}
  if(actual>original){toast('⚠️ El saldo no puede superar el monto original');return;}
  if(minimo<0){toast('⚠️ El pago mínimo no puede ser negativo');return;}

  if(editingDeudaId){
    const idx=deudas.findIndex(d=>d.id===editingDeudaId);
    deudas[idx]={...deudas[idx],acreedor,original,actual,minimo,interes,meta,nota};
    toast('✅ Deuda actualizada');
  } else {
    deudas.push({id:uid(),acreedor,original,actual,minimo,interes,meta,nota,pagos:[]});
    toast('✅ Deuda agregada');
  }
  save(); closeModal('ov-deuda'); renderDeudas();
}

function confirmarDelDeuda(){
  showConf('🗑️','Eliminar deuda',`¿Eliminar "${deudas.find(d=>d.id===editingDeudaId)?.acreedor}" y todos sus pagos? No se puede deshacer.`,()=>{
    deudas=deudas.filter(d=>d.id!==editingDeudaId);
    save(); closeModal('ov-deuda'); renderDeudas(); toast('🗑️ Deuda eliminada');
  });
}

// ══════════════════════════════════════════════════
//  MODAL PAGO
// ══════════════════════════════════════════════════
function openPagoModal(deudaId){
  pagoDeudaId=deudaId;
  const d=deudas.find(x=>x.id===deudaId);
  const sr=saldoReal(d);
  document.getElementById('modal-pago-title').textContent=`Pago — ${d.acreedor}`;
  document.getElementById('pago-saldo-val').textContent=fmtFull(sr);
  document.getElementById('p-monto').value='';
  document.getElementById('p-fecha').value=today();
  document.getElementById('p-nota').value='';
  document.getElementById('ov-pago').classList.add('open');
  setTimeout(()=>document.getElementById('p-monto').focus(),220);
}

function pagarTodo(){
  const d=deudas.find(x=>x.id===pagoDeudaId);
  document.getElementById('p-monto').value=saldoReal(d).toFixed(0);
}

function guardarPago(){
  const monto=parseFloat(document.getElementById('p-monto').value);
  const fecha=document.getElementById('p-fecha').value;
  const nota =document.getElementById('p-nota').value.trim();

  if(isNaN(monto)||monto<=0){toast('⚠️ Ingresa un monto válido');return;}
  if(!fecha){toast('⚠️ Selecciona la fecha');return;}

  const d=deudas.find(x=>x.id===pagoDeudaId);
  if(!d.pagos)d.pagos=[];
  const sr=saldoReal(d);
  if(monto>sr+0.01){toast(`⚠️ Supera el saldo (${fmtFull(sr)})`);return;}

  d.pagos.push({id:uid(),monto,fecha,nota});
  d.pagos.sort((a,b)=>b.fecha.localeCompare(a.fecha));
  save(); closeModal('ov-pago'); renderDeudas();

  const nuevaSr=saldoReal(d);
  if(nuevaSr===0) setTimeout(()=>toast(`🎉 ¡Liquidaste ${d.acreedor}! Increíble.`),300);
  else toast(`✅ ${fmtFull(monto)} registrado · Resta ${fmtFull(nuevaSr)}`);
}

//  HISTORIAL
// ══════════════════════════════════════════════════
function openHistorial(deudaId){

  const d=deudas.find(x=>x.id===deudaId);
  const pagos=d.pagos||[];
  const total=pagos.reduce((s,p)=>s+p.monto,0);
  document.getElementById('modal-hist-title').textContent=`Pagos — ${d.acreedor}`;

  if(!pagos.length){
    document.getElementById('hist-content').innerHTML='<div class="empty" style="padding:28px"><div class="empty-icon">📭</div><div class="empty-text">Sin pagos registrados</div></div>';
  } else {
    document.getElementById('hist-content').innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;margin-bottom:6px;border-bottom:1px solid var(--border)">
        <span style="font-size:12px;color:var(--text2)">${pagos.length} pago${pagos.length!==1?'s':''}</span>
        <span style="font-family:var(--mono);font-weight:500;font-size:14px;color:var(--green)">${fmtFull(total)}</span>
      </div>
      ${pagos.map(p=>`

          <div class="pay-line"></div>

            </button>
            <button class="icon-btn" title="Eliminar" onclick="eliminarPago('${deudaId}','${p.id}')">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        </div>`).join('')}`;
  }
  document.getElementById('ov-hist').classList.add('open');

function openEditPago(deudaId,pagoId){
  pagoDeudaId=deudaId; editingPagoId=pagoId;
  const d=deudas.find(x=>x.id===deudaId);
  const p=d.pagos.find(x=>x.id===pagoId);
  document.getElementById('ep-monto').value=p.monto;
  document.getElementById('ep-fecha').value=p.fecha;
  document.getElementById('ep-nota').value=p.nota||'';
  closeModal('ov-hist');
  document.getElementById('ov-edit-pago').classList.add('open');
  setTimeout(()=>document.getElementById('ep-monto').focus(),220);
}

function guardarEditPago(){
  const monto=parseFloat(document.getElementById('ep-monto').value);
  const fecha=document.getElementById('ep-fecha').value;
  const nota =document.getElementById('ep-nota').value.trim();

  if(isNaN(monto)||monto<=0){toast('⚠️ Monto inválido');return;}
  if(!fecha){toast('⚠️ Selecciona la fecha');return;}

  const d=deudas.find(x=>x.id===pagoDeudaId);
  const idx=d.pagos.findIndex(x=>x.id===editingPagoId);
  const otrosPagados=d.pagos.filter(x=>x.id!==editingPagoId).reduce((s,p)=>s+p.monto,0);
  const disponible=d.actual-otrosPagados;
  if(monto>disponible+0.01){toast(`⚠️ Supera el saldo disponible (${fmtFull(disponible)})`);return;}

  d.pagos[idx]={...d.pagos[idx],monto,fecha,nota};
  d.pagos.sort((a,b)=>b.fecha.localeCompare(a.fecha));
  save(); closeModal('ov-edit-pago'); renderDeudas();
  toast('✅ Pago actualizado');
  setTimeout(()=>openHistorial(pagoDeudaId),160);
}

function eliminarPago(deudaId,pagoId){
  const d=deudas.find(x=>x.id===deudaId);
  const p=d.pagos.find(x=>x.id===pagoId);
  showConf('🗑️','Eliminar pago',`¿Eliminar el pago de ${fmtFull(p.monto)} del ${fmtDate(p.fecha)}?`,()=>{
    d.pagos=d.pagos.filter(x=>x.id!==pagoId);
    save(); renderDeudas(); closeModal('ov-hist');
    setTimeout(()=>openHistorial(deudaId),160);
    toast('🗑️ Pago eliminado');
  });
}

// ══════════════════════════════════════════════════
//  ESTADÍSTICAS — RESUMEN MENSUAL
// ══════════════════════════════════════════════════
function renderStats(){
  const content=document.getElementById('stats-content');

  // Recopilar todos los pagos con deuda
  const allPagos=[];
  deudas.forEach(d=>{
    (d.pagos||[]).forEach(p=>allPagos.push({...p,deudaId:d.id,acreedor:d.acreedor}));
  });

  if(!allPagos.length){
    content.innerHTML='<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">Aquí verás un resumen de lo que pagas cada mes.<br>Empieza registrando pagos en tus deudas.</div></div>';
    return;
  }

  // Agrupar por mes
  const byMonth={};
  allPagos.forEach(p=>{
    const key=p.fecha.slice(0,7); // YYYY-MM
    if(!byMonth[key])byMonth[key]=[];
    byMonth[key].push(p);
  });

  const meses=Object.keys(byMonth).sort().reverse();
  const totalGeneral=allPagos.reduce((s,p)=>s+p.monto,0);

  // Stats globales
  const promMensual=totalGeneral/meses.length;
  const mejorMes=meses.reduce((best,m)=>{
    const t=byMonth[m].reduce((s,p)=>s+p.monto,0);
    return t>(byMonth[best]||[]).reduce((s,p)=>s+p.monto,0)?m:best;
  },meses[0]);
  const mejorTotal=byMonth[mejorMes].reduce((s,p)=>s+p.monto,0);

  content.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px">
        <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">Total pagado</div>
        <div style="font-family:var(--mono);font-size:18px;font-weight:500;color:var(--green)">${fmt(totalGeneral)}</div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px">
        <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">Promedio/mes</div>
        <div style="font-family:var(--mono);font-size:18px;font-weight:500;color:var(--blue)">${fmt(promMensual)}</div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;grid-column:span 2">
        <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px">🏆 Mejor mes</div>
        <div style="font-size:13px;font-weight:600;text-transform:capitalize;margin-bottom:2px">${new Date(mejorMes+'-15').toLocaleDateString('es-CO',{month:'long',year:'numeric'})}</div>
        <div style="font-family:var(--mono);font-size:16px;color:var(--yellow)">${fmtFull(mejorTotal)}</div>
      </div>
    </div>

    <div style="margin-bottom:8px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text2)">Detalle por mes</div>

    ${meses.map(m=>{
      const pagos=byMonth[m].sort((a,b)=>b.fecha.localeCompare(a.fecha));
      const total=pagos.reduce((s,p)=>s+p.monto,0);
      const label=new Date(m+'-15').toLocaleDateString('es-CO',{month:'long',year:'numeric'});
      const id='month-'+m.replace('-','');
      return`<div class="month-card">
        <div class="month-header" onclick="toggleMonth('${id}')">
          <span class="month-name">${label}</span>
          <span class="month-total">${fmtFull(total)}</span>
        </div>
        <div class="month-body" id="${id}">
          ${pagos.map(p=>`
            <div class="month-row">
              <span class="month-row-name">${p.acreedor}${p.nota?` · <em>${p.nota}</em>`:''}</span>
              <span class="month-row-val">${fmtFull(p.monto)}</span>
            </div>`).join('')}
        </div>
      </div>`;
    }).join('')}`;
}

function toggleMonth(id){
  const el=document.getElementById(id);
  el.classList.toggle('open');
}

// ══════════════════════════════════════════════════
//  PLAN BOLA DE NIEVE
// ══════════════════════════════════════════════════
function calcularBolaDeNieve(input,pagoTotal){
  let lista=input.filter(d=>saldoReal(d)>0).map(d=>({...d,saldo:saldoReal(d)})).sort((a,b)=>a.saldo-b.saldo);
  const cron=[]; let mes=0; let totalInt=0;

  while(lista.some(d=>d.saldo>0)&&mes<360){
    mes++;
    lista.forEach(d=>{
      if(d.interes&&d.saldo>0){const im=d.saldo*(d.interes/100/12);d.saldo+=im;totalInt+=im;}
    });
    const minTot=lista.filter(d=>d.saldo>0).reduce((s,d)=>s+d.minimo,0);
    let exc=Math.max(0,pagoTotal-minTot);
    const pagos=[];
    lista.forEach((d,i)=>{
      if(d.saldo<=0)return;
      let pago=Math.min(d.minimo||0,d.saldo);
      const esObj=lista.findIndex(x=>x.saldo>0)===i;
      if(esObj){pago=Math.min(d.saldo,pago+exc);exc=0;}
      d.saldo=Math.max(0,d.saldo-pago);
      if(d.saldo===0)exc+=d.minimo||0;
      pagos.push({acreedor:d.acreedor,pago,saldo:d.saldo});
    });
    cron.push({mes,pagos});
    lista.forEach(d=>{if(d.saldo<=0)d.minimo=0;});
  }
  return{cronograma:cron,meses:mes,totalIntereses:totalInt};
}

function calcularPlan(){
  const pago=parseFloat(document.getElementById('pago-mensual').value);
  const result=document.getElementById('plan-result');
  const activos=deudas.filter(d=>saldoReal(d)>0);

  if(!activos.length){
    result.innerHTML='<div class="empty"><div class="empty-icon">🎉</div><div class="empty-text">¡No tienes deudas activas!</div></div>';
    return;
  }
  if(isNaN(pago)||pago<=0){toast('⚠️ Ingresa cuánto puedes pagar al mes');return;}

  const{cronograma,meses,totalIntereses}=calcularBolaDeNieve(deudas,pago);
  const libre=new Date(); libre.setMonth(libre.getMonth()+meses);
  const fechaStr=libre.toLocaleDateString('es-CO',{month:'long',year:'numeric'});
  const años=Math.floor(meses/12),mr=meses%12;
  const dur=[años&&`${años} año${años>1?'s':''}`,mr&&`${mr} mes${mr>1?'es':''}`].filter(Boolean).join(' y ');

  result.innerHTML=`
    <div class="plan-hero">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div class="plan-stat">
          <div class="plan-stat-label">Meses hasta libertad</div>
          <div class="plan-stat-value">${meses}</div>
        </div>
        <div class="plan-stat">
          <div class="plan-stat-label">Duración</div>
          <div class="plan-stat-value white" style="font-size:16px">${dur}</div>
        </div>
      </div>
      <div class="plan-stat">
        <div class="plan-stat-label">🎉 Fecha estimada de libertad financiera</div>
        <div class="plan-stat-value white" style="font-size:18px;text-transform:capitalize">${fechaStr}</div>
      </div>
      ${totalIntereses>0?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(27,52,80,.5)">
        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);margin-bottom:3px">Total intereses</div>
        <div style="font-family:var(--mono);font-size:15px;color:var(--yellow)">${fmtFull(totalIntereses)}</div>
      </div>`:''}
    </div>

    <div style="margin-bottom:8px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text2)">Cronograma mes a mes</div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;overflow-x:auto;margin-bottom:14px">
      <table class="sched-table">
        <thead><tr><th>Mes</th><th>Deuda</th><th>Pago</th><th>Saldo</th><th></th></tr></thead>
        <tbody>${cronograma.map(m=>m.pagos.map(p=>`
          <tr>
            <td style="color:var(--text2)">${m.mes}</td>
            <td style="color:var(--text)">${p.acreedor}</td>
            <td>${fmt(p.pago)}</td>
            <td style="color:${p.saldo===0?'var(--green)':'var(--text)'}">${fmt(p.saldo)}</td>
            <td>${p.saldo===0?'<span class="tag-done">✓</span>':'<span class="tag-act">↗</span>'}</td>
          </tr>`).join('')).join('')}</tbody>
      </table>
    </div>
    <button class="btn btn-secondary" onclick="window.print()" style="font-size:13px;padding:11px">🖨️ Imprimir plan</button>`;
}

let tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('show'),3000);
}
